<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Scrubber</title>
  <!-- Dark theme styles -->
  <link rel="stylesheet" href="static/style-new.css">
  <!-- Chart.js for visualizations -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Social Media Scrubber</h1>
    <form id="search-form">
      <div id="filter-bar">
        <div>
          <label for="keywords">Keywords or phrases</label>
          <input type="text" id="keywords" placeholder="AI, AI Governance, Artificial Intelligence, Technology" />
        </div>
        <div>
          <label for="platform-select">Platform</label>
          <!-- Collapsed platform selector. The first option (empty value) represents all platforms. -->
          <select id="platform-select">
            <option value="">All Platforms</option>
            <option value="Twitter">X (Twitter)</option>
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="YouTube">YouTube</option>
            <option value="LinkedIn">LinkedIn</option>
          </select>
        </div>
        <div>
          <label for="follower-threshold">Min followers</label>
          <select id="follower-threshold">
            <option value="0">Any</option>
            <option value="1000">1,000+</option>
            <option value="5000">5,000+</option>
            <option value="10000">10,000+</option>
            <option value="50000">50,000+</option>
            <option value="100000">100,000+</option>
          </select>
        </div>
        <div>
          <label for="search-mode">Match type</label>
          <select id="search-mode">
            <option value="any">Contains any</option>
            <option value="all">Contains all</option>
          </select>
        </div>
        <div>
          <label for="start-date">Start</label>
          <input type="date" id="start-date" />
        </div>
        <div>
          <label for="end-date">End</label>
          <input type="date" id="end-date" />
        </div>
        <button type="submit" id="search-button" class="search">Search</button>
        <button type="button" id="clear-button" class="clear">Clear</button>
        <!-- Saved links dropdown that redirects to saved pages -->
        <select id="saved-links">
          <option value="">Saved Links</option>
          <option value="twitter">Twitter</option>
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
          <option value="linkedin">LinkedIn</option>
        </select>
      </div>
    </form>
  </header>
  <main class="container">
    <!-- Results area displayed above charts -->
    <div id="results"></div>
    <!-- Chart area (hidden until results are displayed) -->
    <div id="chart-container" style="display:none;">
      <canvas id="dateChart"></canvas>
      <canvas id="platformChart"></canvas>
    </div>
  </main>
  <!-- Application logic -->
  <script src="static/main.js"></script>
  <script>
    // Handle navigation to saved pages
    document.getElementById('saved-links').addEventListener('change', function() {
      const value = this.value;
      if (value) {
        window.location.href = `saved-${value}.html`;
      }
    });
  </script>
</body>
</html>
