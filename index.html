<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Scrubber</title>
  <!-- Link to the new CSS file for a more colorful theme -->
  <link rel="stylesheet" href="static/style-new.css">
  <!-- Include Chart.js from a CDN for rendering charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
  <h1>Social Media Scrubber</h1>
  <form id="search-form">
    <div class="field-group">
      <label for="keywords">Keywords or phrases (separate by comma or new line)</label>
      <textarea id="keywords" rows="3" placeholder="e.g., climate protest&#10;new regulation"></textarea>
    </div>

    <div class="field-group">
      <label for="platform-select">Platforms</label>
      <!-- Allow multiple selection of platforms -->
      <select id="platform-select" multiple>
        <option value="Twitter">X (Twitter)</option>
        <option value="Instagram">Instagram</option>
        <option value="TikTok">TikTok</option>
        <option value="YouTube">YouTube</option>
      </select>
    </div>

    <div class="field-group">
      <label for="follower-threshold">Minimum follower count</label>
      <!-- Provide common follower count thresholds as a dropdown -->
      <select id="follower-threshold">
        <option value="0">Any</option>
        <option value="1000">1,000+</option>
        <option value="5000">5,000+</option>
        <option value="10000">10,000+</option>
        <option value="50000">50,000+</option>
        <option value="100000">100,000+</option>
      </select>
    </div>

    <div class="field-group">
      <label for="search-mode">Search mode</label>
      <select id="search-mode">
        <option value="exact">Exact phrase</option>
        <option value="keyword">Keyword search</option>
      </select>
    </div>

    <div class="field-group">
      <label>Date range</label>
      <div>
        <label>Start: <input type="date" id="start-date"></label>
        <label>End: <input type="date" id="end-date"></label>
      </div>
    </div>

    <button type="submit" id="search-button" class="primary">Search</button>
    <button type="button" id="clear-button" class="secondary">Clear</button>
  </form>

  <!-- Chart container hidden until results are available.
       Contains multiple canvases for different charts (e.g., posts by date and posts by platform). -->
  <div id="chart-container" style="display:none;">
    <!-- Bar chart of post counts by date -->
    <canvas id="dateChart"></canvas>
    <!-- Doughnut chart of post counts by platform -->
    <canvas id="platformChart"></canvas>
  </div>

  <!-- Container for displaying individual post results -->
  <div id="results"></div>
</div>

<!-- Client-side application logic -->
<script src="static/main.js"></script>
</body>
</html>
